name: Sync with upstream

on:
  schedule:
    - cron: '0 6 * * 1'   # Weekly, Mondays 06:00 UTC
  workflow_dispatch:       # Also run manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write        # so we can file an issue on conflict
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history required for rebase

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://codeberg.org/go-pdf/fpdf.git
          git fetch upstream

      - name: Check whether upstream has new commits
        id: check
        run: |
          UPSTREAM=$(git rev-parse upstream/main)
          BASE=$(git merge-base HEAD upstream/main)
          if [ "$UPSTREAM" = "$BASE" ]; then
            echo "Nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Rebase local patches onto upstream
        id: rebase
        if: steps.check.outputs.changed == 'true'
        run: git rebase upstream/main

      - name: Push
        if: steps.check.outputs.changed == 'true' && steps.rebase.outcome == 'success'
        run: git push --force-with-lease origin HEAD

      - name: Open issue on rebase conflict
        if: failure() && steps.rebase.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: 'Upstream sync failed: rebase conflict',
              body:  `The scheduled sync with codeberg.org/go-pdf/fpdf hit a conflict. See run ${context.runId}. You'll need to rebase locally and push.`
            })
